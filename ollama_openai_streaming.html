<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI Example in HTML/JavaScript</title>
    <style>
        #streamOutput {
            white-space: pre-wrap;
            font-family: monospace;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>OpenAI API Example</h1>
    <button onclick="listModels()">List Models</button>
    <button onclick="retrieveModel()">Retrieve Model Information</button>
    <br>
    <textarea id="chatPrompt" rows="4" cols="50" placeholder="Enter your chat prompt here..."></textarea>
    <br>
    <button onclick="chatCompletion()">Get Chat Completion</button>
    <button onclick="streamChatCompletion()">Stream Chat Completion</button>
    <div id="streamOutput"></div>

    <script>
        const baseURL = 'http://localhost:11434/v1/';
        const apiKey = 'ollama';  // required but not actually used

        async function chatCompletion() {
            const prompt = document.getElementById('chatPrompt').value;
            const requestBody = {
                messages: [{ role: 'user', content: prompt }],
                model: 'llama3.2:1b'
            };
            try {
                const response = await fetch(`${baseURL}chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });
                const data = await response.json();
                console.log('Chat Completion:', data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function streamChatCompletion() {
            const prompt = document.getElementById('chatPrompt').value;
            const outputDiv = document.getElementById('streamOutput');
            outputDiv.textContent = '';

            const requestBody = {
                messages: [{ role: 'user', content: prompt }],
                model: 'llama3.2:1b',
                stream: true
            };

            try {
                const response = await fetch(`${baseURL}chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // create a reader to handle the streaming response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();

                    if (done) {
                        break;
                    }
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            try {
                                const jsonStr = line.slice(6).trim();
                                if (jsonStr && jsonStr !== '[DONE]') {
                                    const parsedData = JSON.parse(jsonStr);
                                    if (parsedData.choices && 
                                        parsedData.choices[0].delta && 
                                        parsedData.choices[0].delta.content) {
                                        // Append the streamed content to the output div
                                        outputDiv.textContent += parsedData.choices[0].delta.content;
                                    }
                                }
                            } catch (parseError) {
                                console.error('Error parsing stream data:', parseError);
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('Streaming Error:', error);
                outputDiv.textContent = `Error: ${error.message}`;
            }
        }

        async function retrieveModel() {
            try {
                const response = await fetch(`${baseURL}models/llama3.2:1b`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                const data = await response.json();
                console.log('Model Information:', data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function listModels() {
            try {
                const response = await fetch(`${baseURL}models`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                const data = await response.json();
                console.log('Model List:', data);
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
