<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange rounded rectangle background -->
  <rect x="5" y="5" width="50" height="50" rx="12" ry="12" fill="#D2691E"/>
  
  <!-- White asterisk/star pattern like Claude's actual logo -->
  <g transform="translate(30, 30)" fill="white">
    <!-- 8 rays forming asterisk -->
    <rect x="-1" y="-16" width="2" height="32" rx="1"/>
    <rect x="-16" y="-1" width="32" height="2" rx="1"/>
    <rect x="-1" y="-16" width="2" height="32" rx="1" transform="rotate(45)"/>
    <rect x="-1" y="-16" width="2" height="32" rx="1" transform="rotate(-45)"/>
  </g>
  
  <!-- Claude text -->
  <text x="70" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="500" fill="white">Claude</text>
</svg>