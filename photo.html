<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 10px; }
        .camera-container { border-radius: 8px; overflow: hidden; background: #000; display: inline-block; max-width: 100%; }
        video { display: block; width: 100%; max-width: 100%; border-radius: 8px; }
        canvas { display: none; }
        .controls { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { background: #333; color: #fff; border: none; padding: 8px 14px; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; }
        button:hover { background: #444; }
        #snap { background: #30d158; }
        #snap:hover { background: #28c04d; }
        .preview { margin-top: 10px; display: none; }
        .preview img { max-width: 100%; border-radius: 8px; border: 2px solid #30d158; }
        .preview.show { display: block; }
        #status { color: #666; font-size: 11px; margin-top: 6px; }
        .mirror { transform: scaleX(-1); }
        .portrait video { aspect-ratio: 3/4; object-fit: cover; }
    </style>
</head>
<body>
    <div class="camera-container" id="cameraContainer">
        <video id="video" autoplay playsinline class="mirror"></video>
        <canvas id="canvas"></canvas>
    </div>
    
    <div class="controls">
        <button id="snap">Take Photo</button>
        <button id="toggleMirror">Mirror: On</button>
        <button id="toggleOrientation">Landscape</button>
    </div>
    
    <p id="status">Starting camera...</p>
    
    <div class="preview" id="preview">
        <img id="photo" alt="Captured photo">
        <div class="controls">
            <button id="download">Download</button>
            <button id="retake">Retake</button>
        </div>
    </div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const preview = document.getElementById('preview');
const photo = document.getElementById('photo');
const cameraContainer = document.getElementById('cameraContainer');

let stream = null;
let mirrored = true;
let isPortrait = false;

async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            status.textContent = 'Space = capture, D = download, R = retake';
        };
    } catch (err) {
        status.textContent = 'Camera error: ' + err.message;
    }
}

function takePhoto() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    
    let sx, sy, sw, sh;
    
    if (isPortrait) {
        // Crop to 3:4 portrait from center
        sh = vh;
        sw = vh * 3 / 4;
        sx = (vw - sw) / 2;
        sy = 0;
        canvas.width = sw;
        canvas.height = sh;
    } else {
        // Full landscape
        sx = 0;
        sy = 0;
        sw = vw;
        sh = vh;
        canvas.width = vw;
        canvas.height = vh;
    }
    
    if (mirrored) {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    
    // Get PNG with 300 DPI
    canvas.toBlob(blob => {
        insertDPI(blob, 300).then(newBlob => {
            photo.src = URL.createObjectURL(newBlob);
            photo._blob = newBlob;
            preview.classList.add('show');
        });
    }, 'image/png');
}

// Insert pHYs chunk for 300 DPI
async function insertDPI(blob, dpi) {
    const buffer = await blob.arrayBuffer();
    const data = new Uint8Array(buffer);
    
    // 300 DPI = 11811 pixels per meter
    const ppm = Math.round(dpi / 0.0254);
    
    // Create pHYs chunk
    const phys = new Uint8Array(21);
    const view = new DataView(phys.buffer);
    view.setUint32(0, 9); // length
    phys.set([112, 72, 89, 115], 4); // "pHYs"
    view.setUint32(8, ppm); // X pixels per unit
    view.setUint32(12, ppm); // Y pixels per unit
    phys[16] = 1; // unit = meter
    
    // Calculate CRC
    const crcData = phys.slice(4, 17);
    const crc = crc32(crcData);
    view.setUint32(17, crc);
    
    // Find IDAT position and insert pHYs before it
    let idatPos = 8;
    while (idatPos < data.length) {
        const len = (data[idatPos] << 24) | (data[idatPos+1] << 16) | (data[idatPos+2] << 8) | data[idatPos+3];
        const type = String.fromCharCode(data[idatPos+4], data[idatPos+5], data[idatPos+6], data[idatPos+7]);
        if (type === 'IDAT') break;
        idatPos += 12 + len;
    }
    
    const newData = new Uint8Array(data.length + 21);
    newData.set(data.slice(0, idatPos));
    newData.set(phys, idatPos);
    newData.set(data.slice(idatPos), idatPos + 21);
    
    return new Blob([newData], { type: 'image/png' });
}

// CRC32 for PNG chunks
function crc32(data) {
    let crc = 0xffffffff;
    const table = [];
    for (let i = 0; i < 256; i++) {
        let c = i;
        for (let j = 0; j < 8; j++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
        table[i] = c;
    }
    for (let i = 0; i < data.length; i++) crc = table[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
    return (crc ^ 0xffffffff) >>> 0;
}

function downloadPhoto() {
    const link = document.createElement('a');
    link.download = 'photo_' + new Date().toISOString().slice(0,19).replace(/[T:]/g, '-') + '.png';
    link.href = photo.src;
    link.click();
}

function retake() { preview.classList.remove('show'); }

function toggleMirror() {
    mirrored = !mirrored;
    video.classList.toggle('mirror', mirrored);
    document.getElementById('toggleMirror').textContent = 'Mirror: ' + (mirrored ? 'On' : 'Off');
}

function toggleOrientation() {
    isPortrait = !isPortrait;
    cameraContainer.classList.toggle('portrait', isPortrait);
    document.getElementById('toggleOrientation').textContent = isPortrait ? 'Portrait' : 'Landscape';
}

document.getElementById('snap').onclick = takePhoto;
document.getElementById('download').onclick = downloadPhoto;
document.getElementById('retake').onclick = retake;
document.getElementById('toggleMirror').onclick = toggleMirror;
document.getElementById('toggleOrientation').onclick = toggleOrientation;

document.onkeydown = e => {
    if (e.code === 'Space') { e.preventDefault(); takePhoto(); }
    if (e.code === 'KeyD' && preview.classList.contains('show')) downloadPhoto();
    if (e.code === 'KeyR' && preview.classList.contains('show')) retake();
};

startCamera();
</script>
</body>
</html>
